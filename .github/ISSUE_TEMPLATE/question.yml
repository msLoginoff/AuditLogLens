name: Question
description: Ask about setup, behavior, or intended usage.
title: "[Question]: "
labels:
  - question
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      placeholder: "How should I configure..."
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add relevant entity shapes, restrictions, enrichment rules, or writer setup.
      render: csharp
    validations:
      required: false
